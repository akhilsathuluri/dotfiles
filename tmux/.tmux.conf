# =============================================================================
# General Settings
# =============================================================================

# Reduce escape delay to 0 (critical for Neovim -- default 500ms causes lag)
set -sg escape-time 0

# True color support (needed for Neovim themes, bat, delta, etc.)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Ghostty extended keys (proper modifier key support in Neovim, etc.)
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

# Mouse support (click panes, resize, scroll)
set -g mouse on

# Scrollback buffer (default is 2000 -- keep modest to limit RAM use)
set -g history-limit 10000

# Start window/pane numbering at 1 (0 is awkward to reach)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Auto-renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Don't let programs rename windows
set -g allow-rename off

# Enable focus events (needed for Neovim autoread)
set -g focus-events on

# vi mode for status line key bindings
set -g status-keys vi

# Allow image preview passthrough (for yazi + Kitty graphics protocol)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Clipboard -- Wayland native (wl-copy)
set -g set-clipboard on
set -g copy-command 'wl-copy'

# Increase message display time
set -g display-time 2000
set -g display-panes-time 2000

# =============================================================================
# Prefix -- keep default Ctrl-b
# =============================================================================

# Using default Ctrl-b prefix (no change needed)

# =============================================================================
# Key Bindings
# =============================================================================

# Enter copy mode without prefix
bind -n M-y copy-mode

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits -- visual mnemonics, preserve current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+number to switch windows without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+j/k to cycle windows
bind -n M-j previous-window
bind -n M-k next-window

# Alt+m to cycle panes
bind -n M-m select-pane -t :.+

# Pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Move window positions
bind -r P swap-window -t -1 \; select-window -t -1
bind -r N swap-window -t +1 \; select-window -t +1

# Toggle synchronized panes (type in all panes at once)
bind S set synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# Kill without confirmation prompt
unbind x
bind x kill-pane
bind X kill-session

# Even out pane sizes
bind = select-layout tiled

# =============================================================================
# Copy Mode (vi-style)
# =============================================================================

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# =============================================================================
# Status Bar
# =============================================================================

set -g status-position bottom
set -g status-interval 5

set -g status-left "#[bold] #S "
set -g status-left-length 30
set -g status-right "#{?client_prefix,#[reverse] PREFIX ,}#($HOME/.local/bin/gitmux -cfg $HOME/.gitmux.conf \"#{pane_current_path}\") #(cd #{pane_current_path} && git log -1 --format='%%h' 2>/dev/null) #($HOME/.local/bin/tmux-ci-status.sh) %Y-%m-%d %H:%M "
set -g status-right-length 200
set -g window-status-current-format "#[reverse] #I:#W#{?window_zoomed_flag, Z,} "
set -g window-status-format " #I:#W "

# Activity monitoring (highlight windows with new output)
set -g monitor-activity on
set -g visual-activity off

# Bell notifications (useful for agent idle detection)
set -g monitor-bell on
set -g bell-action any

# =============================================================================
# Plugins (via TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# tmux-yank: auto-copy on mouse select
set -g @yank_with_mouse on

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Override tmux-yank bindings (must be after TPM, use run-shell to expand $HOME)
# Copy to both clipboard (Ctrl+Shift+V) and primary selection (Shift+Insert)
run-shell 'tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-yank.sh"'
run-shell 'tmux bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-yank.sh"'
run-shell 'tmux bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-yank.sh"'
